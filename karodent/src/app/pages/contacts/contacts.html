                        <input class="field__control" type="text" name="name" />

                    <label class="field">

                    </label>

                    <label class="field">
                        <span class="field__label">Your e-mail</span>
                        <input class="field__control" type="mail" name="mail" />
                    </label>

                    <label class="large-field">

                        <textarea class="field__control field__control--textarea" name="question"></textarea>

                    <button class="form__btn" type="button">SUBMIT</button>
