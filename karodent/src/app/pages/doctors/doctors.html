<div class="page">

    <section class="intro">
        <div class="bg-photo"></div>

        <div class="intro-overlay">
            <hr class="intro-line">

            <h1 class="intro-title">
                {{ 'DOCTORS_PAGE.TITLE' | translate }}
            </h1>

            <button class="make-appointment-button" type="button" (click)="scrollToFooter()">
                {{ 'DOCTORS_PAGE.MAKE_APPOINTMENT' | translate }}
            </button>
        </div>
    </section>

    <div class="doctor-block" *ngFor="let d of doctors; let di = index">
        <div class="doctor-info">
            <img [src]="d.photo" [alt]="'DOCTORS_PAGE.DOCTOR_PHOTO_ALT' | translate">

            <div class="doctor-row">
                <h2 class="doctor-name">
                    {{ d.name }}
                </h2>

                <p class="plain-text">
                    {{ d.textKey | translate }}
                </p>
            </div>
        </div>

        <!-- CAROUSEL -->
        <div class="carousel">
            <button class="arrow left" (click)="prev(di)"
                [attr.aria-label]="'DOCTORS_PAGE.PREVIOUS' | translate"></button>

            <div class="carousel-container" #track>
                <div class="cards">
                    <div class="card" *ngFor="let src of d.loopPhotos; let i = index" (click)="openLightbox(di, i)">
                        <img [src]="src" [alt]="'DOCTORS_PAGE.PHOTO_ALT' | translate" loading="lazy" />
                    </div>
                </div>
            </div>

            <button class="arrow right" (click)="next(di)" [attr.aria-label]="'DOCTORS_PAGE.NEXT' | translate"></button>
        </div>
    </div>

    <!-- LIGHTBOX / MODAL -->
    <div class="lightbox-backdrop" *ngIf="lightboxOpen" (click)="closeLightbox()">
        <div class="lightbox" (click)="$event.stopPropagation()">
            <button class="lightbox-close" (click)="closeLightbox()"
                [attr.aria-label]="'DOCTORS_PAGE.CLOSE' | translate">
                ✕
            </button>

            <button class="lightbox-arrow left" (click)="lightboxPrev()"
                [attr.aria-label]="'DOCTORS_PAGE.PREVIOUS' | translate"></button>

            <div class="lightbox-image">
                <img [src]="lightboxSrc" [alt]="'DOCTORS_PAGE.PHOTO_LARGE_ALT' | translate" />
            </div>

            <button class="lightbox-arrow right" (click)="lightboxNext()"
                [attr.aria-label]="'DOCTORS_PAGE.NEXT' | translate"></button>
        </div>
    </div>

</div>
