<div class="page">

    <section class="intro">
        <div class="bg-photo"></div>

        <div class="intro-overlay">
            <hr class="intro-line">

            <h1 class="intro-title">
                {{ 'PRICES_PAGE.TITLE' | translate }}
            </h1>

            <button class="make-appointment-button" type="button" (click)="scrollToFooter()">
                {{ 'PRICES_PAGE.MAKE_APPOINTMENT' | translate }}
            </button>

        </div>
    </section>

    <section class="info-block">

        <h5 class="caution">
            {{ 'PRICES_PAGE.CAUTION' | translate }}
        </h5>

        <div class="outer-container" *ngFor="let item of prices; let i = index">
            <div class="inner-container">

                <h4 class="number">
                    {{ i + 1 < 10 ? ('0' + (i + 1)) : (i + 1) }} </h4>

                        <img [src]="item.photo" [alt]="item.titleKey | translate">

                        <div>
                            <h4 class="service-name">
                                {{ item.titleKey | translate }}
                            </h4>

                        </div>

                        <div class="price-block">
                            <h3 class="price-note" *ngIf="item.priceNoteKey">
                                {{ item.priceNoteKey | translate }}
                            </h3>

                            <h3 class="price">
                                <span *ngIf="item.pricePrefixKey">
                                    {{ item.pricePrefixKey | translate }}
                                </span>

                                {{ item.price }}
                            </h3>
                        </div>

            </div>
        </div>

        <h5 class="caution">
            {{ 'PRICES_PAGE.CAUTION' | translate }}
        </h5>

    </section>

</div>
