<div class="page">

    <section class="intro">
        <div class="bg-photo"></div>

        <div class="intro-overlay">
            <hr class="intro-line">

            <h1 class="intro-title">
                {{ 'ABOUT.TITLE' | translate }}
            </h1>

            <button class="make-appointment-button" type="button" (click)="scrollToFooter()">
                {{ 'ABOUT.MAKE_APPOINTMENT' | translate }}
            </button>

            <h4 class="intro-text">
                {{ 'ABOUT.INTRO_TEXT' | translate }}
            </h4>
        </div>
    </section>

    <div class="info-block">
        <h2 class="block-title">
            {{ 'ABOUT.OUR_VALUES' | translate }}
        </h2>

        <p class="plain-text">
            {{ 'ABOUT.VALUES_TEXT' | translate }}
        </p>
    </div>

    <div class="info-block">
        <section class="about-body">

            <!-- TEXT -->
            <div class="about-text">
                <h2 class="block-title">
                    {{ 'ABOUT.OUR_HISTORY' | translate }}
                </h2>

                <p class="plain-text">
                    {{ 'ABOUT.HISTORY_TEXT' | translate }}
                </p>
            </div>

            <!-- CAROUSEL -->
            <div class="carousel">
                <div class="carousel-container">
                    <div class="cards">
                        <label class="card" *ngFor="let src of photos; let i = index"
                            [class.left]="stateOf(i) === 'left'" [class.active]="stateOf(i) === 'active'"
                            [class.right]="stateOf(i) === 'right'" [class.hidden]="stateOf(i) === 'hidden'"
                            (click)="setActive(i)">
                            <img [src]="src" [alt]="'ABOUT.PHOTO_ALT' | translate" loading="lazy" />
                        </label>
                    </div>
                </div>
            </div>

        </section>
    </div>

    <div class="ourphotos-block">
        <h2 class="block-title">
            {{ 'ABOUT.OUR_PHOTOS' | translate }}
        </h2>

        <div class="carousel">
            <button class="arrow left" (click)="prev()" [attr.aria-label]="'ABOUT.PREVIOUS' | translate"></button>

            <div class="carousel-container" #track>
                <div class="cards">
                    <div class="card" *ngFor="let src of loopPhotos; let i = index" (click)="openLightbox(i)">
                        <img [src]="src" [alt]="'ABOUT.PHOTO_ALT' | translate" loading="lazy" />
                    </div>
                </div>
            </div>

            <button class="arrow right" (click)="next()" [attr.aria-label]="'ABOUT.NEXT' | translate"></button>
        </div>
    </div>

    <!-- LIGHTBOX / MODAL -->
    <div class="lightbox-backdrop" *ngIf="lightboxOpen" (click)="closeLightbox()">
        <div class="lightbox" (click)="$event.stopPropagation()">
            <button class="lightbox-close" (click)="closeLightbox()" [attr.aria-label]="'ABOUT.CLOSE' | translate">
                ✕
            </button>

            <button class="lightbox-arrow left" (click)="lightboxPrev()"
                [attr.aria-label]="'ABOUT.PREVIOUS' | translate"></button>

            <div class="lightbox-image">
                <img [src]="lightboxSrc" [alt]="'ABOUT.PHOTO_LARGE_ALT' | translate" />
            </div>

            <button class="lightbox-arrow right" (click)="lightboxNext()"
                [attr.aria-label]="'ABOUT.NEXT' | translate"></button>
        </div>
    </div>

</div>
